apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "supportplane.fullname" . }}-frontend-config
  labels:
    {{- include "supportplane.labels" . | nindent 4 }}
data:
  nginx.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        client_max_body_size 500M;

        location /api {
            proxy_pass http://{{ include "supportplane.fullname" . }}-backend:{{ .Values.backend.service.port }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
