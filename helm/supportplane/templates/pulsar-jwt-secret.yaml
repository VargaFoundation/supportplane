{{/*
SupportPlane — Pulsar JWT keypair Secret.

Provisioned only when both:
  - pulsar.enabled (the upstream Apache chart is being deployed)
  - streaming.jwt.createSecret (the operator wants the chart to manage
    the Secret rather than bringing their own)

The Secret has two keys:
  - jwt-public.pem   used by the broker + proxy via tokenPublicKey
  - jwt-private.pem  used by the SupportPlane backend's
                     TenantStreamingService to sign per-tenant tokens

In production, set streaming.jwt.createSecret=false and provide an
externally-managed Secret (Vault / ExternalSecrets / SealedSecrets) with
the same shape.

See docs/adr/0003-pulsar-security.md.
*/}}
{{- if and .Values.pulsar.enabled .Values.streaming.jwt.createSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.streaming.jwt.secretName }}
  labels:
    {{- include "supportplane.labels" . | nindent 4 }}
type: Opaque
data:
  jwt-public.pem: {{ required "streaming.jwt.publicKeyB64 is required when createSecret=true" .Values.streaming.jwt.publicKeyB64 | quote }}
  jwt-private.pem: {{ required "streaming.jwt.privateKeyB64 is required when createSecret=true" .Values.streaming.jwt.privateKeyB64 | quote }}
{{- end }}
{{- if and .Values.pulsar.enabled .Values.streaming.backendToken.createSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.streaming.backendToken.secretName }}
  labels:
    {{- include "supportplane.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.streaming.backendToken.secretKey }}: {{ required "streaming.backendToken.valueB64 is required when createSecret=true" .Values.streaming.backendToken.valueB64 | quote }}
{{- end }}
