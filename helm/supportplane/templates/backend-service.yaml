apiVersion: v1
kind: Service
metadata:
  name: {{ include "supportplane.fullname" . }}-backend
  labels:
    {{- include "supportplane.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    {{- include "supportplane.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
