apiVersion: v2
name: supportplane
description: SupportPlane - ODPSC cluster management platform (umbrella chart)
type: application
version: 1.1.0
appVersion: "1.0.0"
home: https://github.com/odp/supportplane
keywords:
  - supportplane
  - odp
  - cluster-management
  - support
maintainers:
  - name: SupportPlane Team
annotations:
  category: Infrastructure

# Optional upstream dependencies. Each is disabled by default and toggled via
# the corresponding `<name>.enabled` flag in values.yaml. Install with
# `helm dependency update ./helm/supportplane` before packaging.
dependencies:
  - name: clickhouse
    version: "9.4.4"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: clickhouse.enabled
  - name: loki
    version: "6.10.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: loki.enabled
  - name: grafana
    version: "8.4.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled
  - name: pulsar
    version: "3.5.0"
    repository: "https://pulsar.apache.org/charts"
    alias: pulsar
    condition: pulsar.enabled
