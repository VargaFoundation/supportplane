version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: supportplane
      POSTGRES_USER: supportplane
      POSTGRES_PASSWORD: supportplane
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supportplane"]
      interval: 3s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/supportplane
      KC_DB_USERNAME: supportplane
      KC_DB_PASSWORD: supportplane
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/realm-clients.json:/opt/keycloak/data/import/realm-clients.json
      - ./keycloak/realm-support.json:/opt/keycloak/data/import/realm-support.json
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/supportplane
      SPRING_DATASOURCE_USERNAME: supportplane
      SPRING_DATASOURCE_PASSWORD: supportplane
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_CLIENTS_REALM: clients
      KEYCLOAK_SUPPORT_REALM: support
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  frontend:
    build: ./frontend
    depends_on:
      - backend

  test-runner:
    image: curlimages/curl:latest
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./tests/e2e/run-e2e.sh:/tests/run-e2e.sh:ro
    entrypoint: ["sh", "/tests/run-e2e.sh"]
    environment:
      BACKEND_URL: http://backend:8081
      FRONTEND_URL: http://frontend:80
