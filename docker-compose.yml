version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: supportplane
      POSTGRES_USER: supportplane
      POSTGRES_PASSWORD: supportplane
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supportplane"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/supportplane
      KC_DB_USERNAME: supportplane
      KC_DB_PASSWORD: supportplane
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-clients.json:/opt/keycloak/data/import/realm-clients.json
      - ./keycloak/realm-support.json:/opt/keycloak/data/import/realm-support.json
      - ./keycloak/themes/supportplane:/opt/keycloak/themes/supportplane
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/supportplane
      SPRING_DATASOURCE_USERNAME: supportplane
      SPRING_DATASOURCE_PASSWORD: supportplane
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_CLIENTS_REALM: clients
      KEYCLOAK_SUPPORT_REALM: support
      # Streaming (opt-in) — populated from .env, see .env.example.
      PULSAR_ENABLED: ${PULSAR_ENABLED:-false}
      PULSAR_SERVICE_URL: ${PULSAR_SERVICE_URL:-}
      PULSAR_ADMIN_URL: ${PULSAR_ADMIN_URL:-}
      PULSAR_AUTH_TOKEN: ${PULSAR_AUTH_TOKEN:-}
      PULSAR_TLS_TRUST_CERTS: ${PULSAR_TLS_TRUST_CERTS:-}
      PULSAR_JWT_PRIVATE_KEY_PATH: ${PULSAR_JWT_PRIVATE_KEY_PATH:-}
    ports:
      - "8081:8081"
    volumes:
      # Read-only mounts of the Pulsar keys/certs volumes provisioned by
      # docker-compose.infra.yml's pulsar-init sidecar. Only used when
      # PULSAR_ENABLED=true; harmless otherwise.
      - pulsar-keys:/pulsar/keys:ro
      - pulsar-certs:/pulsar/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  # Provisioned by docker-compose.infra.yml's pulsar-init sidecar. Declared
  # external so docker-compose doesn't try to recreate them when this file
  # is used standalone (without the infra stack).
  pulsar-keys:
    external: true
    name: supportplane_pulsar-keys
  pulsar-certs:
    external: true
    name: supportplane_pulsar-certs
