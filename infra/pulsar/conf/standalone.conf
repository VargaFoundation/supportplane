# SupportPlane — Pulsar standalone configuration overrides for dev / CI.
#
# This file is mounted on top of the default standalone.conf to enable:
#  - Token-based authentication (RS256 JWT)
#  - Authorization (per-namespace ACLs enforced by the broker)
#  - TLS on the binary protocol (port 6651) and the admin REST API (port 8443)
#
# Production deployments (Helm) override the same keys via the upstream
# apache/pulsar-helm-chart values — see helm/supportplane/values.yaml.

# ---------------------------------------------------------------- AuthN
authenticationEnabled=true
authenticationProviders=org.apache.pulsar.broker.authentication.AuthenticationProviderToken
tokenPublicKey=file:///pulsar/keys/jwt-public.pem

# ---------------------------------------------------------------- AuthZ
authorizationEnabled=true
authorizationProvider=org.apache.pulsar.broker.authorization.PulsarAuthorizationProvider
superUserRoles=supportplane-backend
proxyRoles=supportplane-proxy

# ---------------------------------------------------------------- TLS
tlsEnabled=true
tlsCertificateFilePath=/pulsar/certs/server.crt
tlsKeyFilePath=/pulsar/certs/server.key
tlsTrustCertsFilePath=/pulsar/certs/ca.crt
tlsAllowInsecureConnection=false
tlsRequireTrustedClientCertOnConnect=false

brokerServicePortTls=6651
webServicePortTls=8443

# Keep the plaintext ports up in dev so the standalone admin CLI inside the
# container can still talk to the broker without TLS material on its side.
# In production those ports are firewalled or disabled at the LB level.
brokerServicePort=6650
webServicePort=8080
